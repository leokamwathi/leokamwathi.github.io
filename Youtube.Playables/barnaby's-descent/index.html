<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barnaby's Descent (YT)</title>
    <!-- YouTube Playables SDK -->
    <script src="https://www.youtube.com/game_api/v1"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0e15;
            overflow: hidden;
            touch-action: none; /* Prevent scrolling on mobile */
            font-family: 'Courier New', Courier, monospace;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="ui-layer"></div>

<script>
/**
 * BARNABY'S DESCENT (YT)
 * A YouTube Playable Game
 */

// ==========================================
// YOUTUBE SDK MOCK/WRAPPER (Failsafe)
// ==========================================
window.ytgame = window.ytgame || {};
window.ytgame.game = window.ytgame.game || {
    firstFrameReady: () => console.log("YT: firstFrameReady"),
    gameReady: () => console.log("YT: gameReady"),
    onPause: (cb) => { window.addEventListener('blur', cb); },
    onResume: (cb) => { window.addEventListener('focus', cb); }
};
window.ytgame.engagement = window.ytgame.engagement || {
    sendScore: (score) => console.log("YT: sendScore", score)
};

// ==========================================
// CONSTANTS & PALETTE
// ==========================================
const PALETTE = {
    bg: '#0d0e15',
    bg2: '#1a1c2c',
    playerBody: '#f4f4f4',
    playerVisor: '#29366f',
    playerEye: '#56ebc3',
    gear: '#e8c170',
    gearHighlight: '#f6e2a2',
    tire: '#333c57',
    tireBounce: '#d77bba',
    laser: '#d95763',
    text: '#ffffff'
};

const GAME_WIDTH = 400;
const GAME_HEIGHT = 700;
let scale = 1;

// ==========================================
// AUDIO ENGINE (Web Audio API Synth)
// ==========================================
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

function playSound(type) {
    if (audioCtx.state === 'suspended') return; // Don't play if not unlocked
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;
    if (type === 'dash') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'break') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'bounce') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
    } else if (type === 'die') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, now);
        osc.frequency.exponentialRampToValueAtTime(10, now + 0.5);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
    }
}

// ==========================================
// GRAPHICS GENERATOR (Offscreen Canvas)
// ==========================================
const assets = {};

function createAsset(name, width, height, drawFn) {
    const c = document.createElement('canvas');
    c.width = width; c.height = height;
    const ctx = c.getContext('2d');
    drawFn(ctx, width, height);
    assets[name] = c;
}

// Draw Barnaby
createAsset('player', 40, 40, (ctx, w, h) => {
    ctx.fillStyle = PALETTE.playerBody;
    ctx.beginPath(); ctx.arc(20, 20, 16, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = PALETTE.playerVisor;
    ctx.fillRect(10, 12, 20, 10);
    ctx.fillStyle = PALETTE.playerEye;
    ctx.beginPath(); ctx.arc(24, 17, 3, 0, Math.PI*2); ctx.fill();
    // Antenna
    ctx.strokeStyle = PALETTE.playerBody; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(20, 4); ctx.lineTo(20, 0); ctx.stroke();
    ctx.fillStyle = PALETTE.laser;
    ctx.beginPath(); ctx.arc(20, 0, 3, 0, Math.PI*2); ctx.fill();
});

// Draw Gear
createAsset('gear', 50, 50, (ctx, w, h) => {
    const cx = 25, cy = 25, r = 18;
    ctx.fillStyle = PALETTE.gear;
    ctx.beginPath();
    for(let i=0; i<8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const x1 = cx + Math.cos(angle - 0.1) * r;
        const y1 = cy + Math.sin(angle - 0.1) * r;
        const x2 = cx + Math.cos(angle - 0.1) * (r+6);
        const y2 = cy + Math.sin(angle - 0.1) * (r+6);
        const x3 = cx + Math.cos(angle + 0.1) * (r+6);
        const y3 = cy + Math.sin(angle + 0.1) * (r+6);
        const x4 = cx + Math.cos(angle + 0.1) * r;
        const y4 = cy + Math.sin(angle + 0.1) * r;
        if(i===0) ctx.moveTo(x1,y1); else ctx.lineTo(x1,y1);
        ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.lineTo(x4,y4);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = PALETTE.bg2;
    ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
});

// Draw Tire
createAsset('tire', 80, 20, (ctx, w, h) => {
    ctx.fillStyle = PALETTE.tire;
    ctx.beginPath(); ctx.roundRect(0, 0, 80, 20, 10); ctx.fill();
    ctx.fillStyle = PALETTE.tireBounce;
    ctx.beginPath(); ctx.roundRect(10, 2, 60, 6, 3); ctx.fill();
});

// ==========================================
// GAME ENGINE & LOGIC
// ==========================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let state = 'MENU'; // MENU, PLAYING, GAMEOVER
let lastTime = 0;
let cameraY = 0;
let score = 0;
let combo = 1;
let hitStop = 0;
let screenShake = 0;

// Entities
let player = {};
let gears = [];
let tires = [];
let lasers = [];
let particles = [];
let floatingTexts = [];

// Input
let targetX = null;
let targetY = null;
let isTapped = false;

function resize() {
    const winW = window.innerWidth;
    const winH = window.innerHeight;
    const ratio = GAME_WIDTH / GAME_HEIGHT;
    
    if (winW / winH < ratio) {
        scale = winW / GAME_WIDTH;
    } else {
        scale = winH / GAME_HEIGHT;
    }
    
    canvas.width = GAME_WIDTH * scale;
    canvas.height = GAME_HEIGHT * scale;
    ctx.scale(scale, scale);
}
window.addEventListener('resize', resize);
resize();

function handleInput(e) {
    e.preventDefault();
    
    // Unlock audio context on first interaction
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }

    if (state === 'MENU') {
        startGame();
        return;
    }
    if (state === 'GAMEOVER') {
        state = 'MENU';
        return;
    }
    
    let clientX, clientY;
    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    const rect = canvas.getBoundingClientRect();
    targetX = (clientX - rect.left) / scale;
    targetY = (clientY - rect.top) / scale + cameraY;
    isTapped = true;
}

canvas.addEventListener('mousedown', handleInput);
canvas.addEventListener('touchstart', handleInput, {passive: false});

function startGame() {
    player = {
        x: GAME_WIDTH / 2, y: 100,
        vx: 0, vy: 0,
        radius: 16,
        canDash: true,
        trail: []
    };
    gears = []; tires = []; lasers = []; particles = []; floatingTexts = [];
    cameraY = 0;
    score = 0;
    combo = 1;
    state = 'PLAYING';
    generateChunk(200);
    generateChunk(800);
}

function generateChunk(startY) {
    // Gears
    for(let i=0; i<5; i++) {
        gears.push({
            x: 50 + Math.random() * (GAME_WIDTH - 100),
            y: startY + Math.random() * 500,
            radius: 20,
            active: true,
            rot: Math.random() * Math.PI
        });
    }
    // Tire
    tires.push({
        x: 50 + Math.random() * (GAME_WIDTH - 180),
        y: startY + 250 + Math.random() * 200,
        w: 80, h: 20
    });
    // Laser
    if (Math.random() > 0.3) {
        lasers.push({
            x: Math.random() > 0.5 ? 0 : GAME_WIDTH - 150,
            y: startY + Math.random() * 500,
            w: 150, h: 10
        });
    }
}

function spawnParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        particles.push({
            x: x, y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1.0,
            color: color
        });
    }
}

function spawnText(x, y, text, color) {
    floatingTexts.push({
        x: x, y: y, text: text, color: color, life: 1.0
    });
}

function update(dt) {
    if (hitStop > 0) {
        hitStop -= dt;
        return;
    }

    if (state === 'PLAYING') {
        // Dash Logic
        if (isTapped && player.canDash) {
            const dx = targetX - player.x;
            const dy = targetY - player.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 0) {
                player.vx = (dx / dist) * 800;
                player.vy = (dy / dist) * 800;
                player.canDash = false;
                playSound('dash');
                screenShake = 5;
            }
            isTapped = false;
        }

        // Gravity & Physics
        player.vy += 1200 * dt; // Gravity
        
        // Drag
        player.vx *= 0.95;
        if (player.vy > 800) player.vy = 800; // Terminal velocity

        player.x += player.vx * dt;
        player.y += player.vy * dt;

        // Wall bounce
        if (player.x < player.radius) { player.x = player.radius; player.vx *= -0.5; }
        if (player.x > GAME_WIDTH - player.radius) { player.x = GAME_WIDTH - player.radius; player.vx *= -0.5; }

        // Trail
        player.trail.push({x: player.x, y: player.y});
        if (player.trail.length > 10) player.trail.shift();

        // Camera Follow
        const targetCameraY = player.y - GAME_HEIGHT * 0.3;
        if (targetCameraY > cameraY) cameraY += (targetCameraY - cameraY) * 10 * dt;

        // Procedural Generation
        if (player.y > gears.length * 100) {
            generateChunk(player.y + GAME_HEIGHT);
        }

        // Collisions - Gears
        for (let g of gears) {
            if (!g.active) continue;
            g.rot += dt;
            const dx = player.x - g.x;
            const dy = player.y - g.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < player.radius + g.radius) {
                g.active = false;
                player.canDash = true;
                player.vy = -300; // Small bounce
                combo++;
                const pts = 10 * combo;
                score += pts;
                hitStop = 0.05;
                screenShake = 10;
                playSound('break');
                spawnParticles(g.x, g.y, PALETTE.gearHighlight, 15);
                spawnText(g.x, g.y, `+${pts}`, PALETTE.text);
            }
        }

        // Collisions - Tires
        for (let t of tires) {
            if (player.y + player.radius > t.y && player.y - player.radius < t.y + t.h &&
                player.x + player.radius > t.x && player.x - player.radius < t.x + t.w) {
                if (player.vy > 0) {
                    player.y = t.y - player.radius;
                    player.vy = -900; // Big bounce
                    player.canDash = true;
                    combo = 1; // Reset combo on safe bounce
                    screenShake = 8;
                    playSound('bounce');
                    spawnParticles(player.x, t.y, PALETTE.tireBounce, 10);
                }
            }
        }

        // Collisions - Lasers
        for (let l of lasers) {
            if (player.y + player.radius > l.y && player.y - player.radius < l.y + l.h &&
                player.x + player.radius > l.x && player.x - player.radius < l.x + l.w) {
                gameOver();
            }
        }

        // Death by falling off screen
        if (player.y > cameraY + GAME_HEIGHT + 50) {
            gameOver();
        }
    }

    // Update Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 500 * dt; // gravity
        p.life -= dt * 2;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Update Texts
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        let t = floatingTexts[i];
        t.y -= 50 * dt;
        t.life -= dt;
        if (t.life <= 0) floatingTexts.splice(i, 1);
    }

    if (screenShake > 0) screenShake -= dt * 30;
    if (screenShake < 0) screenShake = 0;
}

function gameOver() {
    state = 'GAMEOVER';
    playSound('die');
    spawnParticles(player.x, player.y, PALETTE.playerBody, 30);
    screenShake = 20;
    
    // YouTube SDK: Send Score
    try {
        if(window.ytgame && window.ytgame.engagement && typeof window.ytgame.engagement.sendScore === 'function') {
            window.ytgame.engagement.sendScore({ value: score });
        }
    } catch(e) { console.log(e); }
}

function draw() {
    ctx.fillStyle = PALETTE.bg;
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

    ctx.save();
    
    // Screen Shake
    if (screenShake > 0) {
        const sx = (Math.random() - 0.5) * screenShake;
        const sy = (Math.random() - 0.5) * screenShake;
        ctx.translate(sx, sy);
    }

    // Background Grid (Parallax)
    ctx.strokeStyle = PALETTE.bg2;
    ctx.lineWidth = 2;
    const gridOffsetY = -(cameraY * 0.5) % 50;
    ctx.beginPath();
    for(let i=0; i<GAME_WIDTH; i+=50) { ctx.moveTo(i, 0); ctx.lineTo(i, GAME_HEIGHT); }
    for(let i=0; i<GAME_HEIGHT+50; i+=50) { ctx.moveTo(0, i + gridOffsetY); ctx.lineTo(GAME_WIDTH, i + gridOffsetY); }
    ctx.stroke();

    // Camera Transform
    ctx.translate(0, -cameraY);

    // Draw Lasers
    for (let l of lasers) {
        ctx.fillStyle = PALETTE.laser;
        ctx.shadowBlur = 15;
        ctx.shadowColor = PALETTE.laser;
        ctx.fillRect(l.x, l.y, l.w, l.h);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(l.x, l.y + 2, l.w, l.h - 4);
        ctx.shadowBlur = 0;
    }

    // Draw Tires
    for (let t of tires) {
        ctx.drawImage(assets['tire'], t.x, t.y);
    }

    // Draw Gears
    for (let g of gears) {
        if (!g.active) continue;
        ctx.save();
        ctx.translate(g.x, g.y);
        ctx.rotate(g.rot);
        ctx.drawImage(assets['gear'], -25, -25);
        ctx.restore();
    }

    // Draw Player
    if (state === 'PLAYING') {
        // Trail
        ctx.beginPath();
        for(let i=0; i<player.trail.length; i++) {
            const pt = player.trail[i];
            if(i===0) ctx.moveTo(pt.x, pt.y);
            else ctx.lineTo(pt.x, pt.y);
        }
        ctx.strokeStyle = player.canDash ? PALETTE.playerEye : PALETTE.laser;
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.globalAlpha = 0.5;
        ctx.stroke();
        ctx.globalAlpha = 1.0;

        // Player Sprite
        ctx.save();
        ctx.translate(player.x, player.y);
        // Rotate slightly based on velocity
        ctx.rotate(player.vx * 0.001);
        ctx.drawImage(assets['player'], -20, -20);
        
        // Dash Indicator
        if (player.canDash) {
            ctx.strokeStyle = PALETTE.playerEye;
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.stroke();
        }
        ctx.restore();
    }

    // Draw Particles
    for (let p of particles) {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1.0;

    // Draw Floating Texts
    ctx.font = 'bold 20px Courier New';
    ctx.textAlign = 'center';
    for (let t of floatingTexts) {
        ctx.fillStyle = t.color;
        ctx.globalAlpha = t.life;
        ctx.fillText(t.text, t.x, t.y);
    }
    ctx.globalAlpha = 1.0;

    ctx.restore(); // End Camera/Shake transform

    // UI Layer
    ctx.fillStyle = PALETTE.text;
    if (state === 'MENU') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT);
        ctx.fillStyle = PALETTE.text;
        ctx.font = 'bold 30px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText("BARNABY'S", GAME_WIDTH/2, GAME_HEIGHT/2 - 40);
        ctx.fillText("DESCENT (YT)", GAME_WIDTH/2, GAME_HEIGHT/2 - 10);
        ctx.font = '16px Courier New';
        ctx.fillStyle = PALETTE.playerEye;
        ctx.fillText("TAP TO DASH & SHATTER GEARS", GAME_WIDTH/2, GAME_HEIGHT/2 + 40);
        ctx.fillStyle = PALETTE.text;
        ctx.fillText("TAP TO START", GAME_WIDTH/2, GAME_HEIGHT/2 + 80);
    } else if (state === 'PLAYING') {
        ctx.font = 'bold 24px Courier New';
        ctx.textAlign = 'left';
        ctx.fillText(`SCORE: ${score}`, 10, 30);
        ctx.textAlign = 'right';
        ctx.fillStyle = combo > 1 ? PALETTE.playerEye : PALETTE.text;
        ctx.fillText(`COMBO x${combo}`, GAME_WIDTH - 10, 30);
    } else if (state === 'GAMEOVER') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT);
        ctx.fillStyle = PALETTE.laser;
        ctx.font = 'bold 40px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText("SCRAPPED!", GAME_WIDTH/2, GAME_HEIGHT/2 - 40);
        ctx.fillStyle = PALETTE.text;
        ctx.font = '20px Courier New';
        ctx.fillText(`FINAL SCORE: ${score}`, GAME_WIDTH/2, GAME_HEIGHT/2 + 10);
        ctx.font = '16px Courier New';
        ctx.fillText("TAP TO RESTART", GAME_WIDTH/2, GAME_HEIGHT/2 + 60);
    }
}

// ==========================================
// MAIN LOOP
// ==========================================
let isPaused = false;

function loop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    
    // Cap dt to prevent physics explosions on lag
    if (dt > 0.1) dt = 0.1;

    if (!isPaused) {
        update(dt);
        draw();
    }
    
    requestAnimationFrame(loop);
}

// ==========================================
// YOUTUBE SDK LIFECYCLE HOOKS
// ==========================================
function init() {
    // Notify YT SDK that the first frame is ready to be displayed
    if(window.ytgame && window.ytgame.game && typeof window.ytgame.game.firstFrameReady === 'function') {
        window.ytgame.game.firstFrameReady();
    }
    
    // Handle Pause/Resume from YT App
    if(window.ytgame && window.ytgame.game) {
        if (typeof window.ytgame.game.onPause === 'function') {
            window.ytgame.game.onPause(() => {
                isPaused = true;
                if(audioCtx.state === 'running') audioCtx.suspend();
            });
        } else {
            window.addEventListener('blur', () => {
                isPaused = true;
                if(audioCtx.state === 'running') audioCtx.suspend();
            });
        }

        if (typeof window.ytgame.game.onResume === 'function') {
            window.ytgame.game.onResume(() => {
                isPaused = false;
                lastTime = performance.now(); // Reset timer to prevent massive dt
                if(audioCtx.state === 'suspended') audioCtx.resume();
            });
        } else {
            window.addEventListener('focus', () => {
                isPaused = false;
                lastTime = performance.now();
                if(audioCtx.state === 'suspended') audioCtx.resume();
            });
        }
    }

    // Start the game loop
    requestAnimationFrame(loop);

    // Notify YT SDK that the game is fully loaded and interactive
    if(window.ytgame && window.ytgame.game && typeof window.ytgame.game.gameReady === 'function') {
        window.ytgame.game.gameReady();
    }
}

if (document.readyState === 'complete' || document.readyState === 'interactive') {
    init();
} else {
    window.addEventListener('DOMContentLoaded', init);
}

</script>
</body>
</html>
