<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mochi Drop (YT)</title>
    <!-- YouTube Playables SDK -->
    <script src="https://www.youtube.com/game_api/v1"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a2e;
            overflow: hidden;
            touch-action: none; /* Prevent scrolling on mobile */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 500px; /* Constrain on desktop */
            aspect-ratio: 9 / 16;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* UI Layers */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(26, 26, 46, 0.85);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .ui-layer.active {
            opacity: 1;
            pointer-events: auto;
        }

        .ui-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ui-layer.active .ui-panel {
            transform: translateY(0);
        }

        h1 {
            color: #e94560;
            margin: 0 0 10px 0;
            font-size: 36px;
            text-shadow: 2px 2px 0px rgba(233, 69, 96, 0.2);
        }

        p {
            color: #533483;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .score-display {
            font-size: 24px;
            color: #16213e;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* Animated Button */
        button {
            background: linear-gradient(45deg, #e94560, #ff6b81);
            border: none;
            padding: 16px 40px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(233, 69, 96, 0.4);
            animation: pulse 2s infinite;
            transition: transform 0.1s, filter 0.2s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.92);
            filter: brightness(0.9);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 8px 20px rgba(233, 69, 96, 0.4); }
            50% { transform: scale(1.06); box-shadow: 0 8px 30px rgba(233, 69, 96, 0.7); }
            100% { transform: scale(1); box-shadow: 0 8px 20px rgba(233, 69, 96, 0.4); }
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 5;
            display: flex;
            justify-content: space-between;
            width: calc(100% - 40px);
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="450" height="800"></canvas>
    
    <div id="hud">
        <div id="scoreText">0</div>
        <div id="highScoreText">BEST: 0</div>
    </div>

    <!-- Start Screen -->
    <div id="startScreen" class="ui-layer active">
        <div class="ui-panel">
            <h1>Mochi Drop</h1>
            <p>Drop, Bounce, and Merge!</p>
            <button id="startBtn">Play Now</button>
        </div>
    </div>

    <!-- End Screen -->
    <div id="endScreen" class="ui-layer">
        <div class="ui-panel">
            <h1>Nice Try!</h1>
            <div class="score-display">Score: <span id="finalScore">0</span></div>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>
</div>

<script>
/**
 * YouTube Playables SDK Mock/Wrapper
 * Ensures the game runs locally for testing but hooks into YT when deployed.
 */
const YT = {
    init: function() {
        window.ytgame = window.ytgame || {};
        if (!window.ytgame.game) {
            console.log("[YT SDK] Mocking SDK for local testing.");
            window.ytgame.game = {
                firstFrameReady: () => console.log("[YT SDK] firstFrameReady"),
                gameReady: () => console.log("[YT SDK] gameReady")
            };
            window.ytgame.engagement = {
                sendScore: (score) => console.log("[YT SDK] sendScore:", score)
            };
            window.ytgame.system = {
                onPause: (cb) => window.addEventListener('blur', cb),
                onResume: (cb) => window.addEventListener('focus', cb)
            };
        }
    }
};

/**
 * Web Audio API Synthesizer
 */
const AudioSys = {
    ctx: null,
    init: function() {
        if (!this.ctx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AudioContext();
        }
        if (this.ctx.state === 'suspended') this.ctx.resume();
    },
    playTone: function(freq, type, duration, vol) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    },
    drop: function() {
        this.playTone(600, 'sine', 0.15, 0.1);
    },
    merge: function(level) {
        const baseFreq = 300;
        const scale = [1, 1.125, 1.25, 1.5, 1.666, 2, 2.25, 2.5, 3];
        const freq = baseFreq * (scale[level] || scale[scale.length-1]);
        
        this.playTone(freq, 'triangle', 0.3, 0.15);
        setTimeout(() => this.playTone(freq * 1.5, 'sine', 0.2, 0.05), 50);
    },
    end: function() {
        this.playTone(250, 'sawtooth', 0.4, 0.1);
        setTimeout(() => this.playTone(200, 'sawtooth', 0.6, 0.1), 200);
        setTimeout(() => this.playTone(150, 'sawtooth', 1.0, 0.1), 450);
    }
};

/**
 * Game Engine & Logic
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const WIDTH = canvas.width;
const HEIGHT = canvas.height;
const DANGER_LINE = 180;

let state = 'START'; // START, PLAYING, END
let isPaused = false;
let score = 0;
let highScore = 0;
try {
    highScore = localStorage.getItem('mochi_highscore') || 0;
} catch (e) {
    console.warn("localStorage not available", e);
}
let shakeAmount = 0;

let mochis = [];
let pegs = [];
let particles = [];
let floatingTexts = [];

let pointerX = WIDTH / 2;
let isPointerDown = false;
let dropCooldown = 0;
let nextMochiLevel = 0;

const MOCHI_TYPES = [
    { r: 18, color: '#ffffff', shadow: '#dcdde1' }, 
    { r: 26, color: '#ff9ff3', shadow: '#f368e0' }, 
    { r: 36, color: '#48dbfb', shadow: '#0abde3' }, 
    { r: 48, color: '#feca57', shadow: '#ff9f43' }, 
    { r: 62, color: '#1dd1a1', shadow: '#10ac84' }, 
    { r: 78, color: '#5f27cd', shadow: '#341f97' }, 
    { r: 96, color: '#ff6b6b', shadow: '#ee5253' }, 
    { r: 116, color: '#c8d6e5', shadow: '#8395a7' },
    { r: 140, color: '#ff9f43', shadow: '#ee5253' } 
];

class Mochi {
    constructor(x, y, level, isStatic = false) {
        this.x = x;
        this.y = y;
        this.level = level;
        this.radius = MOCHI_TYPES[level].r;
        this.mass = this.radius * this.radius;
        this.vx = 0;
        this.vy = 0;
        this.isStatic = isStatic;
        this.restitution = 0.3;
        this.merged = false;
        this.settleTimer = 0;
        this.scaleX = 1;
        this.scaleY = 1;
    }

    draw(ctx) {
        const type = MOCHI_TYPES[this.level];
        ctx.save();
        ctx.translate(this.x, this.y);
        
        const speed = Math.hypot(this.vx, this.vy);
        if (!this.isStatic && speed > 2) {
            const angle = Math.atan2(this.vy, this.vx);
            ctx.rotate(angle);
            const stretch = Math.min(1.2, 1 + speed * 0.005);
            ctx.scale(stretch, 1 / stretch);
            ctx.rotate(-angle);
        }

        const grad = ctx.createRadialGradient(-this.radius*0.3, -this.radius*0.3, this.radius*0.1, 0, 0, this.radius);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.3, type.color);
        grad.addColorStop(1, type.shadow);

        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        ctx.fillStyle = '#2d3436';
        const eyeR = this.radius * 0.08;
        const eyeOffset = this.radius * 0.3;
        
        ctx.beginPath(); ctx.arc(-eyeOffset, -eyeR, eyeR, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(eyeOffset, -eyeR, eyeR, 0, Math.PI*2); ctx.fill();
        
        ctx.fillStyle = 'rgba(255, 118, 117, 0.6)';
        ctx.beginPath(); ctx.arc(-eyeOffset*1.2, eyeR*1.5, eyeR*1.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(eyeOffset*1.2, eyeR*1.5, eyeR*1.2, 0, Math.PI*2); ctx.fill();

        ctx.strokeStyle = '#2d3436';
        ctx.lineWidth = Math.max(2, this.radius * 0.04);
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(0, eyeR, eyeR*1.5, 0.1, Math.PI - 0.1, false);
        ctx.stroke();

        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
        this.color = color;
        this.size = Math.random() * 6 + 3;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.2;
        this.life -= 0.03;
    }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

class FloatingText {
    constructor(x, y, text, color) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color;
        this.life = 1.0;
        this.vy = -2;
    }
    update() {
        this.y += this.vy;
        this.life -= 0.02;
    }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.font = "bold 28px 'Segoe UI', sans-serif";
        ctx.textAlign = "center";
        ctx.strokeStyle = "white";
        ctx.lineWidth = 4;
        ctx.strokeText(this.text, this.x, this.y);
        ctx.fillText(this.text, this.x, this.y);
        ctx.globalAlpha = 1.0;
    }
}

function resolveCollision(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const distSq = dx*dx + dy*dy;
    const minDist = a.radius + b.radius;

    if (distSq < minDist * minDist && distSq > 0) {
        const dist = Math.sqrt(distSq);
        const overlap = minDist - dist;
        
        const nx = dx / dist;
        const ny = dy / dist;

        const totalMass = a.mass + b.mass;
        const aRatio = a.isStatic ? 0 : (b.isStatic ? 1 : b.mass / totalMass);
        const bRatio = b.isStatic ? 0 : (a.isStatic ? 1 : a.mass / totalMass);
        
        const correction = overlap * 0.8;
        if (!a.isStatic) { a.x -= nx * correction * aRatio; a.y -= ny * correction * aRatio; }
        if (!b.isStatic) { b.x += nx * correction * bRatio; b.y += ny * correction * bRatio; }

        const rvx = b.vx - a.vx;
        const rvy = b.vy - a.vy;
        const velAlongNormal = rvx * nx + rvy * ny;

        if (velAlongNormal > 0) return;

        const e = Math.min(a.restitution, b.restitution);
        let j = -(1 + e) * velAlongNormal;
        j /= (a.isStatic ? 0 : 1/a.mass) + (b.isStatic ? 0 : 1/b.mass);

        const impulseX = j * nx;
        const impulseY = j * ny;

        if (!a.isStatic) { a.vx -= impulseX / a.mass; a.vy -= impulseY / a.mass; }
        if (!b.isStatic) { b.vx += impulseX / b.mass; b.vy += impulseY / b.mass; }
        
        const tangentX = -ny;
        const tangentY = nx;
        const velAlongTangent = rvx * tangentX + rvy * tangentY;
        const friction = 0.1;
        
        if (!a.isStatic) { a.vx += tangentX * velAlongTangent * friction; a.vy += tangentY * velAlongTangent * friction; }
        if (!b.isStatic) { b.vx -= tangentX * velAlongTangent * friction; b.vy -= tangentY * velAlongTangent * friction; }
    }
}

function spawnParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        particles.push(new Particle(x, y, color));
    }
}

function initGame() {
    mochis = [];
    particles = [];
    floatingTexts = [];
    score = 0;
    updateScore();
    nextMochiLevel = Math.floor(Math.random() * 3);
    
    pegs = [];
    const rows = 3;
    for(let r=0; r<rows; r++) {
        const cols = r % 2 === 0 ? 3 : 2;
        const spacingX = WIDTH / (cols + 1);
        const startY = 400 + r * 120;
        for(let c=0; c<cols; c++) {
            let p = new Mochi(spacingX * (c + 1), startY, 0, true);
            p.radius = 12;
            pegs.push(p);
        }
    }
}

function updateScore() {
    document.getElementById('scoreText').innerText = score;
    document.getElementById('highScoreText').innerText = "BEST: " + Math.max(score, highScore);
}

function triggerGameOver() {
    state = 'END';
    AudioSys.end();
    
    if (score > highScore) {
        highScore = score;
        try {
            localStorage.setItem('mochi_highscore', highScore);
        } catch (e) {
            console.warn("localStorage not available", e);
        }
    }
    
    document.getElementById('finalScore').innerText = score;
    document.getElementById('endScreen').classList.add('active');
    
    if (window.ytgame && window.ytgame.engagement) {
        window.ytgame.engagement.sendScore(score);
    }
}

function handlePointerMove(e) {
    if (state !== 'PLAYING') return;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const scaleX = canvas.width / rect.width;
    pointerX = (clientX - rect.left) * scaleX;
    
    const r = MOCHI_TYPES[nextMochiLevel].r;
    pointerX = Math.max(r, Math.min(WIDTH - r, pointerX));
}

function handlePointerUp(e) {
    if (state === 'PLAYING' && dropCooldown <= 0) {
        AudioSys.init();
        
        let m = new Mochi(pointerX, 80, nextMochiLevel);
        m.vy = 2;
        mochis.push(m);
        
        AudioSys.drop();
        dropCooldown = 45;
        nextMochiLevel = Math.floor(Math.random() * 3);
    }
}

window.addEventListener('mousemove', handlePointerMove);
window.addEventListener('touchmove', handlePointerMove, {passive: false});
window.addEventListener('mouseup', handlePointerUp);
window.addEventListener('touchend', handlePointerUp);

document.getElementById('startBtn').addEventListener('click', () => {
    AudioSys.init();
    document.getElementById('startScreen').classList.remove('active');
    initGame();
    state = 'PLAYING';
});

document.getElementById('restartBtn').addEventListener('click', () => {
    document.getElementById('endScreen').classList.remove('active');
    initGame();
    state = 'PLAYING';
});

let firstFrameRendered = false;

function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);
    
    if (isPaused) return;

    const bgGrad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
    bgGrad.addColorStop(0, '#1a1a2e');
    bgGrad.addColorStop(1, '#16213e');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    ctx.save();
    if (shakeAmount > 0) {
        const dx = (Math.random() - 0.5) * shakeAmount;
        const dy = (Math.random() - 0.5) * shakeAmount;
        ctx.translate(dx, dy);
        shakeAmount *= 0.9;
        if (shakeAmount < 0.5) shakeAmount = 0;
    }

    if (state === 'PLAYING') {
        if (dropCooldown > 0) dropCooldown--;

        if (dropCooldown <= 0) {
            ctx.beginPath();
            ctx.setLineDash([10, 15]);
            ctx.moveTo(pointerX, 80);
            ctx.lineTo(pointerX, HEIGHT);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.globalAlpha = 0.5;
            let ghost = new Mochi(pointerX, 80, nextMochiLevel);
            ghost.draw(ctx);
            ctx.globalAlpha = 1.0;
        }

        ctx.beginPath();
        ctx.setLineDash([15, 15]);
        ctx.moveTo(0, DANGER_LINE);
        ctx.lineTo(WIDTH, DANGER_LINE);
        ctx.strokeStyle = 'rgba(233, 69, 96, 0.4)';
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.setLineDash([]);

        const gravity = 0.4;
        const iterations = 5;

        for (let m of mochis) {
            m.vy += gravity;
            m.x += m.vx;
            m.y += m.vy;
            
            if (m.x - m.radius < 0) { m.x = m.radius; m.vx *= -0.5; }
            if (m.x + m.radius > WIDTH) { m.x = WIDTH - m.radius; m.vx *= -0.5; }
            if (m.y + m.radius > HEIGHT) { 
                m.y = HEIGHT - m.radius; 
                m.vy *= -0.4; 
                m.vx *= 0.8;
            }
        }

        let mergesToProcess = [];
        
        for (let iter = 0; iter < iterations; iter++) {
            for (let i = 0; i < mochis.length; i++) {
                for (let j = i + 1; j < mochis.length; j++) {
                    let a = mochis[i];
                    let b = mochis[j];
                    
                    resolveCollision(a, b);

                    if (iter === iterations - 1 && a.level === b.level && !a.merged && !b.merged) {
                        const dist = Math.hypot(b.x - a.x, b.y - a.y);
                        if (dist < (a.radius + b.radius) * 1.1) {
                            a.merged = true;
                            b.merged = true;
                            mergesToProcess.push({a, b});
                        }
                    }
                }
                
                for (let p of pegs) {
                    resolveCollision(mochis[i], p);
                }
            }
        }

        for (let m of mergesToProcess) {
            mochis = mochis.filter(mochi => mochi !== m.a && mochi !== m.b);
            
            const newLevel = m.a.level + 1;
            const midX = (m.a.x + m.b.x) / 2;
            const midY = (m.a.y + m.b.y) / 2;
            
            if (newLevel < MOCHI_TYPES.length) {
                let newMochi = new Mochi(midX, midY, newLevel);
                newMochi.vx = (m.a.vx + m.b.vx) * 0.5;
                newMochi.vy = (m.a.vy + m.b.vy) * 0.5;
                mochis.push(newMochi);
                
                const pts = (newLevel) * 100;
                score += pts;
                updateScore();
                AudioSys.merge(newLevel);
                shakeAmount = newLevel * 2;
                spawnParticles(midX, midY, MOCHI_TYPES[newLevel].color, 15 + newLevel*5);
                floatingTexts.push(new FloatingText(midX, midY, `+${pts}`, MOCHI_TYPES[newLevel].color));
            } else {
                score += 5000;
                updateScore();
                AudioSys.merge(8);
                shakeAmount = 20;
                spawnParticles(midX, midY, '#ffffff', 50);
                floatingTexts.push(new FloatingText(midX, midY, `MAX! +5000`, '#ffffff'));
            }
        }

        let isGameOver = false;
        for (let m of mochis) {
            if (m.y - m.radius < DANGER_LINE && Math.abs(m.vy) < 1.0 && Math.abs(m.vx) < 1.0) {
                m.settleTimer++;
                if (m.settleTimer > 90) {
                    isGameOver = true;
                    break;
                }
            } else {
                m.settleTimer = 0;
            }
        }

        if (isGameOver) {
            triggerGameOver();
        }
    }

    for (let p of pegs) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.shadowColor = '#48dbfb';
        ctx.shadowBlur = 15;
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    for (let m of mochis) {
        m.draw(ctx);
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw(ctx);
        if (particles[i].life <= 0) particles.splice(i, 1);
    }

    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        floatingTexts[i].update();
        floatingTexts[i].draw(ctx);
        if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
    }

    ctx.restore();

    if (!firstFrameRendered) {
        firstFrameRendered = true;
        if (window.ytgame && window.ytgame.game) {
            window.ytgame.game.firstFrameReady();
            window.ytgame.game.gameReady();
        }
    }
}

window.onload = () => {
    YT.init();
    
    if (window.ytgame && window.ytgame.system) {
        window.ytgame.system.onPause(() => {
            isPaused = true;
            if (AudioSys.ctx) AudioSys.ctx.suspend();
        });
        window.ytgame.system.onResume(() => {
            isPaused = false;
            if (AudioSys.ctx) AudioSys.ctx.resume();
        });
    }

    document.getElementById('highScoreText').innerText = "BEST: " + highScore;
    
    requestAnimationFrame(gameLoop);
};

</script>
</body>
</html>
