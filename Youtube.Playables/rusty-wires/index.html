<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rusty Wires</title>
    <script src="https://www.youtube.com/game_api/v1"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #1a1a24; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            touch-action: none; 
        }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        #uiLayer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; display: flex; flex-direction: column; 
            justify-content: space-between; 
        }
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: rgba(26, 26, 36, 0.9); pointer-events: auto; 
            transition: opacity 0.3s; 
        }
        .hidden { opacity: 0; pointer-events: none !important; visibility: hidden; z-index: -1; }
        h1 { 
            color: #00ffff; font-size: 3rem; text-shadow: 0 0 10px #00ffff; 
            margin-bottom: 10px; text-align: center;
        }
        p { 
            color: #a0a0b0; font-size: 1.2rem; margin-bottom: 30px; 
            text-align: center; max-width: 80%;
        }
        .btn { 
            background: linear-gradient(45deg, #00ffff, #0088ff); border: none; 
            border-radius: 25px; padding: 15px 40px; color: #1a1a24; 
            font-size: 1.5rem; font-weight: bold; cursor: pointer; pointer-events: auto; 
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4); 
            transition: transform 0.2s, box-shadow 0.2s; 
            animation: pulse 2s infinite; 
        }
        .btn:active { transform: scale(0.95); }
        @keyframes pulse { 
            0% { transform: scale(1); box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4); } 
            50% { transform: scale(1.05); box-shadow: 0 4px 25px rgba(0, 255, 255, 0.7); } 
            100% { transform: scale(1); box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4); } 
        }
        #hud { 
            display: flex; justify-content: space-between; padding: 20px; 
            pointer-events: none; width: 100%; box-sizing: border-box; 
        }
        .hud-text { 
            color: #00ffff; font-size: 1.5rem; font-weight: bold; 
            text-shadow: 0 0 5px #00ffff; pointer-events: auto;
        }
        .icon-btn { 
            background: none; border: none; color: #00ffff; font-size: 2rem; 
            cursor: pointer; text-shadow: 0 0 5px #00ffff; transition: transform 0.2s; 
            pointer-events: auto;
        }
        .icon-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <div id="hud" class="hidden">
            <div class="hud-text" id="levelDisplay">Level 1</div>
            <div>
                <button class="icon-btn" id="muteBtn">🔊</button>
                <button class="icon-btn" id="pauseBtn">⏸️</button>
            </div>
        </div>
        
        <div id="startScreen" class="screen">
            <h1>Rusty Wires</h1>
            <p>Rotate the tiles to connect the power source to all the bulbs.</p>
            <button class="btn" id="startBtn">PLAY</button>
        </div>

        <div id="endScreen" class="screen hidden">
            <h1 id="endTitle">Level Cleared!</h1>
            <p id="endDesc">Great job restoring the power.</p>
            <button class="btn" id="nextBtn">NEXT LEVEL</button>
        </div>

        <div id="pauseScreen" class="screen hidden">
            <h1>Paused</h1>
            <button class="btn" id="resumeBtn">RESUME</button>
        </div>
    </div>

    <script>
        // --- Audio Synthesizer ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let isMuted = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol=0.1) {
            if (isMuted || !audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playRotateSound() { playTone(400, 'sine', 0.1, 0.05); }
        function playPowerSound() { playTone(600, 'triangle', 0.2, 0.05); }
        function playWinSound() {
            playTone(440, 'sine', 0.3, 0.1); // A4
            setTimeout(() => playTone(554.37, 'sine', 0.3, 0.1), 100); // C#5
            setTimeout(() => playTone(659.25, 'sine', 0.5, 0.1), 200); // E5
        }

        // --- Game State ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        let grid = [];
        let cols = 4;
        let rows = 4;
        let tileSize = 0;
        let offsetX = 0;
        let offsetY = 0;
        
        let currentLevel = 1;
        let state = 'START'; // START, PLAYING, PAUSED, END
        
        // UI Elements
        const startScreen = document.getElementById('startScreen');
        const endScreen = document.getElementById('endScreen');
        const pauseScreen = document.getElementById('pauseScreen');
        const hud = document.getElementById('hud');
        const levelDisplay = document.getElementById('levelDisplay');
        const muteBtn = document.getElementById('muteBtn');
        
        // YT SDK
        let ytReady = false;
        try {
            if (window.ytgame && window.ytgame.game) {
                ytReady = true;
                ytgame.game.firstFrameReady();
            }
        } catch (e) {
            console.warn("YouTube SDK not fully available", e);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            const maxTileW = width / (cols + 1);
            const maxTileH = height / (rows + 2);
            tileSize = Math.min(maxTileW, maxTileH);
            offsetX = (width - (cols * tileSize)) / 2;
            offsetY = (height - (rows * tileSize)) / 2;
        }
        window.addEventListener('resize', resize);

        // --- Maze Generation ---
        // Connections: 0:Up, 1:Right, 2:Down, 3:Left
        const DIRS = [[0,-1], [1,0], [0,1], [-1,0]];
        
        class Tile {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.connections = [false, false, false, false]; // U, R, D, L
                this.rotation = 0; // 0, 1, 2, 3 (x90 deg)
                this.targetRotation = 0;
                this.currentAngle = 0;
                this.isSource = false;
                this.isBulb = false;
                this.isPowered = false;
            }
            
            getRotatedConnections() {
                let rot = [];
                for(let i=0; i<4; i++) {
                    rot[i] = this.connections[(i - this.rotation + 4) % 4];
                }
                return rot;
            }
            
            rotate() {
                this.rotation = (this.rotation + 1) % 4;
                this.targetRotation += Math.PI / 2;
                playRotateSound();
                checkPower();
            }
        }

        function generateLevel() {
            cols = Math.min(10, 3 + Math.floor(currentLevel / 2));
            rows = Math.min(12, 4 + Math.floor(currentLevel / 2));
            resize();
            
            grid = [];
            for(let x=0; x<cols; x++) {
                grid[x] = [];
                for(let y=0; y<rows; y++) {
                    grid[x][y] = new Tile(x, y);
                }
            }
            
            // Recursive Backtracker for Spanning Tree
            let visited = Array(cols).fill().map(() => Array(rows).fill(false));
            let stack = [];
            let startX = Math.floor(Math.random() * cols);
            let startY = Math.floor(Math.random() * rows);
            
            grid[startX][startY].isSource = true;
            visited[startX][startY] = true;
            stack.push({x: startX, y: startY});
            
            let endpoints = [];
            
            while(stack.length > 0) {
                let curr = stack[stack.length - 1];
                let unvisitedNeighbors = [];
                
                for(let i=0; i<4; i++) {
                    let nx = curr.x + DIRS[i][0];
                    let ny = curr.y + DIRS[i][1];
                    if(nx >= 0 && nx < cols && ny >= 0 && ny < rows && !visited[nx][ny]) {
                        unvisitedNeighbors.push({x: nx, y: ny, dir: i});
                    }
                }
                
                if(unvisitedNeighbors.length > 0) {
                    let next = unvisitedNeighbors[Math.floor(Math.random() * unvisitedNeighbors.length)];
                    // Connect
                    grid[curr.x][curr.y].connections[next.dir] = true;
                    grid[next.x][next.y].connections[(next.dir + 2) % 4] = true;
                    
                    visited[next.x][next.y] = true;
                    stack.push({x: next.x, y: next.y});
                } else {
                    let popped = stack.pop();
                    // If it's a dead end and not the source, maybe make it a bulb
                    let connCount = grid[popped.x][popped.y].connections.filter(c=>c).length;
                    if(connCount === 1 && !(popped.x === startX && popped.y === startY)) {
                        endpoints.push(grid[popped.x][popped.y]);
                    }
                }
            }
            
            // Assign bulbs
            let numBulbs = Math.max(1, Math.floor(endpoints.length * 0.5));
            // Shuffle endpoints
            endpoints.sort(() => Math.random() - 0.5);
            for(let i=0; i<numBulbs; i++) {
                endpoints[i].isBulb = true;
            }
            if(numBulbs === 0) {
                // Fallback
                let bx = (startX + 1) % cols;
                grid[bx][startY].isBulb = true;
            }
            
            // Scramble rotations
            for(let x=0; x<cols; x++) {
                for(let y=0; y<rows; y++) {
                    let r = Math.floor(Math.random() * 4);
                    grid[x][y].rotation = r;
                    grid[x][y].targetRotation = r * Math.PI / 2;
                    grid[x][y].currentAngle = grid[x][y].targetRotation;
                }
            }
            
            checkPower();
        }

        function checkPower() {
            // Reset power
            let sourceTile = null;
            for(let x=0; x<cols; x++) {
                for(let y=0; y<rows; y++) {
                    grid[x][y].isPowered = false;
                    if(grid[x][y].isSource) sourceTile = grid[x][y];
                }
            }
            
            // BFS to spread power
            let queue = [sourceTile];
            sourceTile.isPowered = true;
            
            let bulbsPowered = 0;
            let totalBulbs = 0;
            
            while(queue.length > 0) {
                let curr = queue.shift();
                let conns = curr.getRotatedConnections();
                
                for(let i=0; i<4; i++) {
                    if(conns[i]) {
                        let nx = curr.x + DIRS[i][0];
                        let ny = curr.y + DIRS[i][1];
                        
                        if(nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                            let neighbor = grid[nx][ny];
                            let neighborConns = neighbor.getRotatedConnections();
                            // Check if neighbor connects back
                            if(neighborConns[(i + 2) % 4] && !neighbor.isPowered) {
                                neighbor.isPowered = true;
                                queue.push(neighbor);
                            }
                        }
                    }
                }
            }
            
            for(let x=0; x<cols; x++) {
                for(let y=0; y<rows; y++) {
                    if(grid[x][y].isBulb) {
                        totalBulbs++;
                        if(grid[x][y].isPowered) bulbsPowered++;
                    }
                }
            }
            
            if(bulbsPowered === totalBulbs && totalBulbs > 0) {
                // Win!
                setTimeout(levelComplete, 500);
            }
        }

        // --- Rendering ---
        let particles = [];
        function spawnParticles(x, y, color) {
            for(let i=0; i<20; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color: color
                });
            }
        }

        function draw() {
            ctx.fillStyle = '#1a1a24';
            ctx.fillRect(0, 0, width, height);
            
            if(state === 'START') {
                requestAnimationFrame(draw);
                return;
            }
            
            ctx.save();
            ctx.translate(offsetX, offsetY);
            
            // Draw Grid Background
            ctx.strokeStyle = '#2a2a36';
            ctx.lineWidth = 2;
            for(let x=0; x<cols; x++) {
                for(let y=0; y<rows; y++) {
                    ctx.strokeRect(x * tileSize, y * tileSize, tileSize, tileSize);
                }
            }
            
            // Draw Tiles
            for(let x=0; x<cols; x++) {
                for(let y=0; y<rows; y++) {
                    let tile = grid[x][y];
                    
                    // Lerp rotation
                    tile.currentAngle += (tile.targetRotation - tile.currentAngle) * 0.2;
                    
                    let cx = x * tileSize + tileSize/2;
                    let cy = y * tileSize + tileSize/2;
                    
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(tile.currentAngle);
                    
                    let wireColor = tile.isPowered ? '#00ffff' : '#8c5a45';
                    let glow = tile.isPowered ? 15 : 0;
                    
                    ctx.strokeStyle = wireColor;
                    ctx.lineWidth = tileSize * 0.15;
                    ctx.lineCap = 'round';
                    ctx.shadowBlur = glow;
                    ctx.shadowColor = wireColor;
                    
                    // Draw connections based on original unrotated state
                    ctx.beginPath();
                    if(tile.connections[0]) { ctx.moveTo(0, 0); ctx.lineTo(0, -tileSize/2); }
                    if(tile.connections[1]) { ctx.moveTo(0, 0); ctx.lineTo(tileSize/2, 0); }
                    if(tile.connections[2]) { ctx.moveTo(0, 0); ctx.lineTo(0, tileSize/2); }
                    if(tile.connections[3]) { ctx.moveTo(0, 0); ctx.lineTo(-tileSize/2, 0); }
                    ctx.stroke();
                    
                    // Draw center node
                    ctx.fillStyle = '#1a1a24';
                    ctx.beginPath();
                    ctx.arc(0, 0, tileSize * 0.15, 0, Math.PI*2);
                    ctx.fill();
                    ctx.stroke();
                    
                    ctx.restore();
                    
                    // Draw Source / Bulb (not rotated)
                    ctx.save();
                    ctx.translate(cx, cy);
                    if(tile.isSource) {
                        ctx.fillStyle = '#ff0055';
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = '#ff0055';
                        ctx.beginPath();
                        ctx.arc(0, 0, tileSize * 0.25, 0, Math.PI*2);
                        ctx.fill();
                        // Inner pulse
                        ctx.fillStyle = '#fff';
                        ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 200) * 0.5;
                        ctx.beginPath();
                        ctx.arc(0, 0, tileSize * 0.1, 0, Math.PI*2);
                        ctx.fill();
                    } else if(tile.isBulb) {
                        ctx.fillStyle = tile.isPowered ? '#ffff00' : '#444';
                        ctx.shadowBlur = tile.isPowered ? 30 : 0;
                        ctx.shadowColor = '#ffff00';
                        ctx.beginPath();
                        ctx.arc(0, 0, tileSize * 0.25, 0, Math.PI*2);
                        ctx.fill();
                        // Bulb highlight
                        ctx.fillStyle = 'rgba(255,255,255,0.5)';
                        ctx.shadowBlur = 0;
                        ctx.beginPath();
                        ctx.arc(-tileSize*0.08, -tileSize*0.08, tileSize * 0.08, 0, Math.PI*2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            }
            
            ctx.restore();
            
            // Draw Particles
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
                ctx.fill();
                
                if(p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1.0;
            
            requestAnimationFrame(draw);
        }

        // --- Input ---
        canvas.addEventListener('pointerdown', (e) => {
            if(state !== 'PLAYING') return;
            
            initAudio();
            
            let rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left - offsetX;
            let y = e.clientY - rect.top - offsetY;
            
            let col = Math.floor(x / tileSize);
            let row = Math.floor(y / tileSize);
            
            if(col >= 0 && col < cols && row >= 0 && row < rows) {
                grid[col][row].rotate();
            }
        });

        // --- Game Flow ---
        function startGame() {
            initAudio();
            state = 'PLAYING';
            startScreen.classList.add('hidden');
            hud.classList.remove('hidden');
            levelDisplay.innerText = `Level ${currentLevel}`;
            generateLevel();
            if(ytReady && window.ytgame && window.ytgame.game) {
                try { ytgame.game.gameReady(); } catch(e) {}
            }
        }

        function levelComplete() {
            if(state === 'END') return;
            state = 'END';
            playWinSound();
            
            // Spawn particles at bulbs
            for(let x=0; x<cols; x++) {
                for(let y=0; y<rows; y++) {
                    if(grid[x][y].isBulb) {
                        spawnParticles(offsetX + x*tileSize + tileSize/2, offsetY + y*tileSize + tileSize/2, '#ffff00');
                    }
                }
            }
            
            setTimeout(() => {
                endScreen.classList.remove('hidden');
                document.getElementById('endTitle').innerText = `Level ${currentLevel} Cleared!`;
                if(ytReady && window.ytgame && window.ytgame.engagement) {
                    try { ytgame.engagement.sendScore({score: currentLevel}); } catch(e) {}
                }
                
                // Save progress
                try { localStorage.setItem('rustyWiresLevel', currentLevel); } catch(e){}
            }, 1000);
        }

        function nextLevel() {
            currentLevel++;
            state = 'PLAYING';
            endScreen.classList.add('hidden');
            levelDisplay.innerText = `Level ${currentLevel}`;
            generateLevel();
        }

        // UI Listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('nextBtn').addEventListener('click', nextLevel);
        
        document.getElementById('pauseBtn').addEventListener('click', () => {
            if(state === 'PLAYING') {
                state = 'PAUSED';
                pauseScreen.classList.remove('hidden');
            }
        });
        
        document.getElementById('resumeBtn').addEventListener('click', () => {
            if(state === 'PAUSED') {
                state = 'PLAYING';
                pauseScreen.classList.add('hidden');
            }
        });
        
        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            muteBtn.innerText = isMuted ? '🔇' : '🔊';
        });

        // YT SDK Lifecycle
        if(window.ytgame && window.ytgame.system) {
            try {
                ytgame.system.onPause(() => {
                    if(state === 'PLAYING') {
                        state = 'PAUSED';
                        pauseScreen.classList.remove('hidden');
                    }
                });
                ytgame.system.onResume(() => {
                    // Wait for user to click resume
                });
            } catch(e) {}
        }

        // Init
        try {
            let saved = localStorage.getItem('rustyWiresLevel');
            if(saved) currentLevel = parseInt(saved);
        } catch(e){}
        
        resize();
        requestAnimationFrame(draw);
    </script>
</body>
</html>
